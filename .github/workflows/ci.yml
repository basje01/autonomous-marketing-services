name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test

  anchor:
    name: Anchor (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coral-xyz/anchor-action@v0.3
        with:
          anchor-version: "0.31.1"
          solana-cli-version: stable

      - name: Build program
        working-directory: campaign-escrow
        run: anchor build
