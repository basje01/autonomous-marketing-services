schema: paperclip/v1

agents:
  marketing-strategist:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-6
        maxTurnsPerRun: 25
        timeoutSec: 900
    inputs:
      env:
        COLOSSEUM_COPILOT_PAT:
          kind: secret
          requirement: required
        INTEL_API_KEY:
          kind: secret
          requirement: required

  chief-of-staff:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 20
        timeoutSec: 600
    inputs:
      env:
        INTEL_API_KEY:
          kind: secret
          requirement: required

  seo-agent:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 25
        timeoutSec: 900

  content-agent:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 25
        timeoutSec: 900

  social-agent:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 20
        timeoutSec: 600

  community-agent:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 20
        timeoutSec: 600

  evals-engineer:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        maxTurnsPerRun: 15
        timeoutSec: 600
